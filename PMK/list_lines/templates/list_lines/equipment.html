{% extends "base.html" %}
{% block content %}
  {% load django_tables2 %}
  <div class="container mt-4">
    <form method="get" class="mb-3">
      {{ filter.form.as_p }}
      <button type="submit" class="btn btn-primary">Применить фильтр</button>
      <a href="?{{ filter.form.reset_url_params }}" class="btn btn-secondary">Сбросить фильтр</a>
    </form>
    {% render_table table %}
  </div>
{% endblock %}
